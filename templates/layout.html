<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure Assessment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Markdown Rendering Library -->
    <!-- Diff Rendering Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
</head>

<body>
    <div class="container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>Infra Assessment</h2>
            </div>
            <ul class="list-unstyled components">
                <li>
                    <a href="#infraSubmenu" data-toggle="collapse" aria-expanded="false" class="dropdown-toggle">인프라
                        진단</a>
                    <ul class="collapse list-unstyled" id="infraSubmenu">
                        <li>
                            <a href="#" class="nav-link" data-url="/infrastructure/web-server">진단 시작</a>
                        </li>
                    </ul>
                </li>
                <li>
                    <a href="#settingsSubmenu" data-toggle="collapse" aria-expanded="false"
                        class="dropdown-toggle">설정</a>
                    <ul class="collapse list-unstyled" id="settingsSubmenu">
                        <li>
                            <a href="#" class="nav-link" data-url="/settings/llm">LLM API 설정</a>
                        </li>
                    </ul>
                </li>
            </ul>
        </nav>

        <div id="content">
            <div id="main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
