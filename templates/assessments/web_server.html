<h2>진단 시작</h2>
<div class="assessment-content">

    <!-- ① 진단 대상 서버 카드 -->
    <div class="card" style="margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>진단 대상 서버</h3>
            <button id="add-server-btn" class="btn-secondary">+ 서버 추가</button>
        </div>

        <div id="server-list">
            <!-- Server tiles will be added here by JS -->
        </div>

        <button id="start-check-btn" type="button" class="btn-primary" style="margin-top: 20px; width: 100%;">설정
            조회</button>

        <div id="scan-status" style="margin-top: 15px; padding: 10px; border-radius: 4px; display: none;"></div>

        <!-- 설정 조회 결과: 서버별 설정파일 타일이 이 안에 생성됩니다 -->
        <div id="config-results-container" style="margin-top: 20px; display: none;">
            <h3 style="margin-bottom: 15px;">서버별 설정 파일</h3>
            <div id="config-results-table-container"></div>
        </div>
    </div>

    <!-- ② AI Prompt Settings 카드 (진단 대상 서버 카드와 동일 레벨) -->
    <div class="card" style="margin-bottom: 20px;">
        <details style="border: none; padding: 0;">
            <summary style="cursor: pointer; font-weight: bold; color: #555; font-size: 1.05em;">AI Prompt Settings (AI
                프롬프트 설정)
            </summary>
            <div style="margin-top: 15px;">

                <!-- ① AI 프롬프트 자동 생성 -->
                <div
                    style="background: #f0f7ff; border: 1px solid #b3d4f5; border-radius: 6px; padding: 15px; margin-bottom: 15px;">
                    <h4 style="margin: 0 0 10px; color: #1565c0;">🤖 AI 프롬프트 자동 생성</h4>
                    <p style="font-size: 0.85em; color: #555; margin-bottom: 10px;">
                        진단하고 싶은 내용을 입력하면 AI가 최적의 시스템/유저 프롬프트를 생성합니다.<br>
                        <em>예: "가용성 중심 점검", "보안 취약점 위주 분석", "MPM 성능 튜닝"</em>
                    </p>
                    <div style="display: flex; gap: 8px; align-items: flex-end;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.85em; font-weight: bold;">진단 의도</label>
                            <input type="text" id="prompt-intent-input" class="form-control"
                                placeholder="예: 가용성 중심으로 Apache 설정 점검"
                                style="width: 100%; padding: 8px; margin-top: 4px;">
                        </div>
                        <button type="button" id="generate-prompt-btn" class="btn-primary"
                            style="padding: 8px 16px; white-space: nowrap; background: #1565c0;">
                            ✨ 생성
                        </button>
                    </div>
                    <div id="generate-prompt-status" style="margin-top: 8px; font-size: 0.85em; display: none;"></div>
                </div>

                <!-- System Prompt -->
                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <label>System Prompt (시스템 프롬프트)</label>
                        <button type="button" class="improve-prompt-btn btn-secondary" data-target="system"
                            data-textarea="ai-system-prompt"
                            style="font-size: 11px; padding: 3px 8px; background: #6f42c1;">
                            🔧 AI 개선
                        </button>
                    </div>
                    <textarea id="ai-system-prompt" class="form-control"
                        style="width: 100%; min-height: 100px; font-family: monospace; font-size: 13px;">{{ config.get('azure_openai_system_prompt', '') }}</textarea>
                    <p style="font-size: 0.8em; color: #666;">AI의 역할과 분석 기준을 정의합니다.</p>
                </div>

                <!-- User Prompt -->
                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <label>User Prompt (사용자 프롬프트)</label>
                        <button type="button" class="improve-prompt-btn btn-secondary" data-target="user"
                            data-textarea="ai-user-prompt"
                            style="font-size: 11px; padding: 3px 8px; background: #6f42c1;">
                            🔧 AI 개선
                        </button>
                    </div>
                    <textarea id="ai-user-prompt" class="form-control"
                        style="width: 100%; min-height: 100px; font-family: monospace; font-size: 13px;">{{ config.get('azure_openai_user_prompt', '') }}</textarea>
                    <p style="font-size: 0.8em; color: #666;">실제 분석 요청 메시지입니다. <code>{content}</code> 부분에 설정 파일 내용이
                        삽입됩니다.</p>
                </div>

                <!-- ② 프롬프트 개선 피드백 입력 -->
                <div id="improve-prompt-panel"
                    style="background: #f5f0ff; border: 1px solid #c9b8f5; border-radius: 6px; padding: 15px; display: none;">
                    <h4 style="margin: 0 0 8px; color: #6f42c1;">🔧 AI 프롬프트 개선</h4>
                    <input type="hidden" id="improve-target-type" value="system">
                    <div style="display: flex; gap: 8px; align-items: flex-end;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.85em; font-weight: bold;">개선 요청사항</label>
                            <input type="text" id="improve-feedback-input" class="form-control"
                                placeholder="예: 표 형식을 더 활용해줘, 보안 항목을 추가해줘"
                                style="width: 100%; padding: 8px; margin-top: 4px;">
                        </div>
                        <button type="button" id="do-improve-prompt-btn" class="btn-primary"
                            style="padding: 8px 16px; white-space: nowrap; background: #6f42c1;">
                            개선 실행
                        </button>
                        <button type="button" id="cancel-improve-btn" class="btn-secondary"
                            style="padding: 8px 16px; white-space: nowrap;">
                            취소
                        </button>
                    </div>
                    <div id="improve-prompt-status" style="margin-top: 8px; font-size: 0.85em; display: none;"></div>
                </div>

            </div>
        </details>
    </div>

    <!-- ③ AI 진단 타일: 설정 조회 후 이 안에 생성됩니다 -->
    <div id="ai-diagnosis-container" style="display: none;">
        <div id="ai-diagnosis-table-container"></div>
    </div>

</div>

<!-- Template for Server Tile -->
<template id="server-tile-template">
    <div class="server-tile card"
        style="margin-bottom: 15px; padding: 15px; background: #f9f9f9; border: 1px solid #eee;">
        <div style="display: flex; justify-content: flex-end;">
            <button type="button" class="remove-server-btn"
                style="background: none; border: none; color: #ff4444; cursor: pointer;">✕ 삭제</button>
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px;">
            <div class="form-group">
                <label>Server IP</label>
                <input type="text" class="server-ip" placeholder="Server IP" style="width: 100%; padding: 8px;">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" class="server-user" placeholder="root" style="width: 100%; padding: 8px;">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="server-pass" placeholder="Password" style="width: 100%; padding: 8px;">
            </div>
        </div>
    </div>
</template>
